<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper-Quality Decision-Tree Walkthrough — K-ATLAS</title>
<style>
  :root {
    --navy: #1C3D3A;
    --navy-2: #163230;
    --teal: #2A7868;
    --teal-lt: #5AC8AA;
    --teal-bg: #E6F5F0;
    --amber: #E8872A;
    --amber-lt: #FFF3E0;
    --amber-dk: #9a5010;
    --gold: #F5A623;
    --cream: #F7F4EF;
    --warm-border: #E0D8CC;
    --warm-grey: #D8D0C5;
    --ink: #1f2a2a;
    --ink-mid: #4a5757;
    --ink-soft: #6e7c7c;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--cream);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  header.app-header {
    background: var(--navy);
    color: #fff;
    padding: 14px 24px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 18px;
    align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.10);
    z-index: 10;
    position: sticky;
    top: 0;
  }
  .brand {
    font-family: var(--serif);
    font-size: 18px;
    color: #fff;
    letter-spacing: .2px;
  }
  .brand .accent { color: var(--gold); }
  .brand .sub {
    display: block;
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--teal-lt);
    margin-top: 2px;
  }
  .progress-strip {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }
  .progress-label {
    font-size: 12px;
    color: var(--teal-lt);
    letter-spacing: .4px;
  }
  .progress-bar {
    width: 260px;
    height: 6px;
    background: rgba(255,255,255,0.18);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--amber));
    transition: width 0.25s ease;
  }
  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn {
    border: 1px solid rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.08);
    color: #fff;
    padding: 7px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-family: var(--sans);
    transition: background .15s ease, border-color .15s ease;
  }
  .btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.55); }
  .btn.primary {
    background: var(--amber);
    border-color: var(--amber);
    color: #fff;
    font-weight: 600;
  }
  .btn.primary:hover { background: var(--amber-dk); border-color: var(--amber-dk); }
  .btn.ghost { background: transparent; }
  .btn[disabled] { opacity: 0.45; cursor: not-allowed; }

  main {
    display: grid;
    grid-template-columns: minmax(360px, 40%) 1fr;
    gap: 0;
    height: calc(100vh - 70px);
  }
  @media (max-width: 1000px) {
    main { grid-template-columns: 1fr; height: auto; }
    .left-pane { max-height: 35vh; }
  }

  .left-pane {
    background: #fff;
    border-right: 1px solid var(--warm-border);
    overflow-y: auto;
    padding: 22px 26px 80px;
  }
  .left-pane::-webkit-scrollbar { width: 8px; }
  .left-pane::-webkit-scrollbar-thumb { background: var(--warm-border); border-radius: 4px; }
  .left-pane h1, .left-pane h2, .left-pane h3 {
    font-family: var(--serif);
    color: var(--navy);
    margin-top: 1.5em;
    margin-bottom: 0.4em;
  }
  .left-pane h1 { font-size: 22px; border-bottom: 2px solid var(--teal); padding-bottom: 8px; margin-top: 0; }
  .left-pane h2 { font-size: 18px; color: var(--teal); }
  .left-pane h3 { font-size: 15px; color: var(--navy); }
  .left-pane h3.current-node {
    background: var(--amber-lt);
    color: var(--amber-dk);
    padding: 6px 10px;
    border-left: 4px solid var(--amber);
    margin-left: -10px;
    border-radius: 0 4px 4px 0;
  }
  .left-pane p { font-size: 13.5px; color: var(--ink-mid); margin: 0.6em 0; }
  .left-pane table {
    border-collapse: collapse;
    width: 100%;
    margin: 0.8em 0;
    font-size: 12.5px;
  }
  .left-pane th, .left-pane td {
    border: 1px solid var(--warm-border);
    padding: 6px 9px;
    text-align: left;
    vertical-align: top;
  }
  .left-pane th { background: var(--teal-bg); color: var(--navy); font-weight: 600; }
  .left-pane code { background: var(--warm-grey); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .left-pane .dk-pref-placeholder {
    background: var(--teal-bg);
    border-left: 3px solid var(--teal);
    padding: 8px 12px;
    margin: 0.5em 0;
    font-size: 13px;
    color: var(--ink-mid);
  }
  .left-pane .dk-pref-placeholder.filled {
    background: var(--amber-lt);
    border-left-color: var(--amber);
    color: var(--amber-dk);
  }

  .right-pane {
    overflow-y: auto;
    padding: 30px 38px 80px;
    background: var(--cream);
  }
  .right-pane::-webkit-scrollbar { width: 8px; }
  .right-pane::-webkit-scrollbar-thumb { background: var(--warm-border); border-radius: 4px; }

  .node-card {
    background: #fff;
    border: 1px solid var(--warm-border);
    border-radius: 6px;
    padding: 26px 30px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    max-width: 860px;
  }
  .node-breadcrumb {
    font-size: 12px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: var(--teal);
    margin: 0 0 6px;
    font-weight: 600;
  }
  .node-title {
    font-family: var(--serif);
    font-size: 23px;
    color: var(--navy);
    margin: 0 0 8px;
    line-height: 1.3;
  }
  .node-context {
    font-size: 14px;
    color: var(--ink-mid);
    margin: 0 0 18px;
    line-height: 1.55;
  }

  .options-table {
    border: 1px solid var(--warm-border);
    border-radius: 5px;
    overflow: hidden;
    margin: 16px 0 20px;
  }
  .option-row {
    display: grid;
    grid-template-columns: 36px 1fr;
    border-bottom: 1px solid var(--warm-border);
    padding: 12px 14px;
    cursor: pointer;
    transition: background .12s ease;
  }
  .option-row:last-child { border-bottom: none; }
  .option-row:hover { background: var(--teal-bg); }
  .option-row.selected { background: var(--amber-lt); }
  .option-row.other { background: #fafafa; }
  .option-row.other.selected { background: var(--amber-lt); }
  .option-radio { padding-top: 3px; }
  .option-radio input { transform: scale(1.1); }
  .option-body { font-size: 14px; }
  .option-label { font-weight: 600; color: var(--navy); }
  .option-detail {
    font-size: 13px;
    color: var(--ink-mid);
    margin-top: 4px;
    line-height: 1.5;
  }
  .option-detail code { background: var(--warm-grey); padding: 1px 4px; border-radius: 3px; font-size: 12px; }

  .write-in-text {
    grid-column: 1 / -1;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--warm-border);
    display: none;
  }
  .write-in-text.shown { display: block; }
  .write-in-text input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--warm-border);
    border-radius: 4px;
    font-size: 14px;
    font-family: var(--sans);
  }
  .write-in-text input:focus { outline: 2px solid var(--teal-lt); border-color: var(--teal); }

  .form-group {
    margin: 18px 0;
  }
  .form-label {
    display: block;
    font-size: 12.5px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--teal);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .form-help {
    font-size: 12.5px;
    color: var(--ink-soft);
    margin: -3px 0 8px;
    font-style: italic;
  }
  .rationale-area {
    width: 100%;
    min-height: 110px;
    padding: 12px 14px;
    border: 1px solid var(--warm-border);
    border-radius: 5px;
    font-size: 14px;
    font-family: var(--sans);
    color: var(--ink);
    background: #fff;
    line-height: 1.55;
    resize: vertical;
  }
  .rationale-area:focus { outline: 2px solid var(--teal-lt); border-color: var(--teal); }

  .form-inline {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .pill-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    padding: 6px 13px;
    border: 1px solid var(--warm-border);
    border-radius: 999px;
    background: #fff;
    color: var(--ink-mid);
    font-size: 13px;
    cursor: pointer;
    transition: all .12s ease;
  }
  .pill:hover { border-color: var(--teal); color: var(--teal); }
  .pill.selected { background: var(--teal); border-color: var(--teal); color: #fff; font-weight: 600; }

  .checkbox-group { display: flex; align-items: center; gap: 8px; }
  .checkbox-group input { transform: scale(1.15); }
  .checkbox-group label { font-size: 13.5px; color: var(--ink-mid); cursor: pointer; }

  .node-nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: center;
    margin-top: 26px;
    padding-top: 18px;
    border-top: 1px solid var(--warm-border);
  }
  .node-nav .nav-btn {
    padding: 9px 18px;
    border-radius: 5px;
    border: 1px solid var(--warm-border);
    background: #fff;
    color: var(--navy);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background .12s ease, border-color .12s ease;
  }
  .node-nav .nav-btn:hover { background: var(--teal-bg); border-color: var(--teal); }
  .node-nav .nav-btn:first-child { justify-self: start; }
  .node-nav .nav-btn.primary {
    background: var(--amber);
    border-color: var(--amber);
    color: #fff;
    font-weight: 600;
    justify-self: end;
  }
  .node-nav .nav-btn.primary:hover { background: var(--amber-dk); border-color: var(--amber-dk); }
  .node-nav .nav-status { font-size: 13px; color: var(--ink-soft); text-align: center; }

  .save-indicator {
    position: fixed;
    bottom: 18px;
    right: 22px;
    background: var(--navy);
    color: #fff;
    padding: 8px 14px;
    border-radius: 4px;
    font-size: 12.5px;
    opacity: 0;
    transition: opacity .35s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    z-index: 100;
  }
  .save-indicator.shown { opacity: 0.92; }

  .completion-banner {
    background: var(--teal-bg);
    border: 1px solid var(--teal);
    border-radius: 6px;
    padding: 22px 26px;
    margin: 30px 0;
    color: var(--navy);
  }
  .completion-banner h2 { font-family: var(--serif); margin: 0 0 8px; }
  .completion-banner p { margin: 0 0 12px; font-size: 14.5px; }

  .intro-section {
    background: #fff;
    border: 1px solid var(--warm-border);
    border-radius: 6px;
    padding: 22px 28px;
    margin-bottom: 22px;
  }
  .intro-section h2 { font-family: var(--serif); color: var(--navy); margin: 0 0 10px; font-size: 19px; }
  .intro-section p { font-size: 14px; color: var(--ink-mid); margin: 0 0 12px; }
  .intro-section ul { font-size: 13.5px; color: var(--ink-mid); padding-left: 22px; margin: 0 0 12px; }
  .intro-section li { margin-bottom: 4px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">
    K-ATL<span class="accent">AS</span>
    <span class="sub">Paper-quality decision tree</span>
  </div>
  <div class="progress-strip">
    <div class="progress-label" id="progressLabel">Loading…</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
  </div>
  <div class="header-actions">
    <button class="btn ghost" id="btnAllNodes" title="Jump to any node">All nodes</button>
    <button class="btn" id="btnExport" title="Export annotated preferences as JSON for Codex">Export JSON</button>
  </div>
</header>

<main>
  <aside class="left-pane" id="leftPane">
    <h1>Paper-Quality Decision Tree — DK Walkthrough</h1>
    <p>Loading decision tree…</p>
  </aside>
  <section class="right-pane" id="rightPane">
    <div class="node-card" id="nodeCard">
      <p>Loading…</p>
    </div>
  </section>
</main>

<div class="save-indicator" id="saveIndicator">Saved locally</div>

<script>

const STORAGE_KEY = "ka_paper_quality_walkthrough_v1";
const SAVE_DEBOUNCE_MS = 350;

// ==========================================================================
// State
// ==========================================================================

let state = loadState();
let currentNodeIdx = state.lastNodeIdx || 0;
let saveTimer = null;

function flatNodes() {
  const out = [];
  for (const b of TREE.branches) {
    for (const n of b.nodes) {
      out.push({ branchId: b.id, branchTitle: b.title, branchPreamble: b.preamble, ...n });
    }
  }
  return out;
}

const NODES = flatNodes();

function freshAnswer() {
  return {
    selectedOption: null,
    selectedOptionIsOther: false,
    writeInLabel: "",
    rationale: "",
    confidence: null,
    flagForPanel: false,
    updatedAt: null
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { answers: {}, lastNodeIdx: 0 };
    const parsed = JSON.parse(raw);
    return parsed && typeof parsed === "object" ? parsed : { answers: {}, lastNodeIdx: 0 };
  } catch (e) {
    console.warn("Failed to load state:", e);
    return { answers: {}, lastNodeIdx: 0 };
  }
}

function saveState(immediate) {
  if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
  const doSave = () => {
    try {
      state.lastNodeIdx = currentNodeIdx;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      flashSaveIndicator();
    } catch (e) {
      console.warn("Save failed:", e);
    }
  };
  if (immediate) doSave();
  else saveTimer = setTimeout(doSave, SAVE_DEBOUNCE_MS);
}

function flashSaveIndicator() {
  const el = document.getElementById("saveIndicator");
  el.classList.add("shown");
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove("shown"), 1100);
}

function getAnswer(nodeId) {
  if (!state.answers[nodeId]) state.answers[nodeId] = freshAnswer();
  return state.answers[nodeId];
}

function isAnswered(nodeId) {
  const a = state.answers[nodeId];
  if (!a) return false;
  const hasChoice = a.selectedOption !== null || (a.selectedOptionIsOther && a.writeInLabel.trim().length > 0);
  return hasChoice && a.rationale.trim().length > 0;
}

function answeredCount() {
  return NODES.filter(n => isAnswered(n.id)).length;
}

// ==========================================================================
// Rendering
// ==========================================================================

function renderProgress() {
  const total = NODES.length;
  const done = answeredCount();
  const pct = Math.round((done / total) * 100);
  document.getElementById("progressLabel").textContent =
    `Node ${currentNodeIdx + 1} of ${total} · ${done}/${total} answered (${pct}%)`;
  document.getElementById("progressFill").style.width = `${pct}%`;
}

function renderLeftPane() {
  const pane = document.getElementById("leftPane");
  let html = `<h1>${TREE.title}</h1>`;
  html += `<p style="font-size:13px;color:var(--ink-soft);">Source: <code>${TREE.source}</code> · ${NODES.length} nodes across ${TREE.branches.length} branches · annotations export to <code>data/paper_quality_dk_preferences.json</code></p>`;

  const currentNode = NODES[currentNodeIdx];
  for (const b of TREE.branches) {
    html += `<h2 id="branch-${b.id}">${b.id.replace("B", "Branch ")} — ${escapeHtml(b.title)}</h2>`;
    if (b.preamble) html += `<p>${escapeHtml(b.preamble)}</p>`;
    for (const n of b.nodes) {
      const isCurrent = n.id === currentNode.id;
      const answered = isAnswered(n.id);
      html += `<h3 id="node-${n.id}" class="${isCurrent ? "current-node" : ""}">Node ${n.id} — ${escapeHtml(n.title)}</h3>`;
      if (n.context) html += `<p>${escapeHtml(n.context)}</p>`;
      html += `<table><thead><tr><th>Option</th><th>Detail</th></tr></thead><tbody>`;
      for (const opt of n.options) {
        html += `<tr><td><strong>${escapeHtml(opt.label)}</strong></td><td>${escapeHtml(opt.detail)}</td></tr>`;
      }
      html += `</tbody></table>`;
      if (answered) {
        const a = state.answers[n.id];
        const choice = a.selectedOptionIsOther
          ? `<em>Other — ${escapeHtml(a.writeInLabel)}</em>`
          : `<strong>${escapeHtml(a.selectedOption)}</strong>`;
        html += `<div class="dk-pref-placeholder filled"><strong>DK preference:</strong> ${choice}<br><span style="font-size:12.5px;">${escapeHtml(a.rationale)}</span></div>`;
      } else {
        html += `<div class="dk-pref-placeholder"><strong>DK preference:</strong> [unanswered]</div>`;
      }
    }
  }
  pane.innerHTML = html;
  setTimeout(() => {
    const target = pane.querySelector(`#node-${currentNode.id}`);
    if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
  }, 60);
}

function renderRightPane() {
  if (currentNodeIdx >= NODES.length) {
    renderCompletion();
    return;
  }
  const n = NODES[currentNodeIdx];
  const a = getAnswer(n.id);

  let html = `<div class="node-card">`;
  html += `<div class="node-breadcrumb">${n.branchId.replace("B", "Branch ")} · ${escapeHtml(n.branchTitle)}</div>`;
  html += `<h2 class="node-title">Node ${n.id} — ${escapeHtml(n.title)}</h2>`;
  if (n.context) html += `<p class="node-context">${escapeHtml(n.context)}</p>`;

  // Options
  html += `<div class="form-group"><span class="form-label">Choose one option</span>`;
  html += `<div class="options-table">`;
  for (let i = 0; i < n.options.length; i++) {
    const opt = n.options[i];
    const isSelected = !a.selectedOptionIsOther && a.selectedOption === opt.label;
    html += `
      <div class="option-row ${isSelected ? "selected" : ""}" data-option-idx="${i}" role="button">
        <div class="option-radio"><input type="radio" name="option" ${isSelected ? "checked" : ""} aria-label="${escapeHtml(opt.label)}"></div>
        <div class="option-body">
          <div class="option-label">${escapeHtml(opt.label)}</div>
          <div class="option-detail">${escapeHtml(opt.detail)}</div>
        </div>
      </div>`;
  }
  // Other / write-in
  const otherSelected = a.selectedOptionIsOther;
  html += `
    <div class="option-row other ${otherSelected ? "selected" : ""}" data-option-idx="other" role="button">
      <div class="option-radio"><input type="radio" name="option" ${otherSelected ? "checked" : ""} aria-label="Other — write in"></div>
      <div class="option-body">
        <div class="option-label">Other — write in</div>
        <div class="option-detail">If none of the listed options matches, or you want to modify one, name your option here.</div>
        <div class="write-in-text ${otherSelected ? "shown" : ""}">
          <input type="text" id="writeInLabel" placeholder="Name the option (e.g. 'tiered by sample size')" value="${escapeAttr(a.writeInLabel)}">
        </div>
      </div>
    </div>`;
  html += `</div></div>`;

  // Rationale
  html += `
    <div class="form-group">
      <span class="form-label">Rationale (2–4 sentences)</span>
      <div class="form-help">Explain your judgement. Cite a paper, a panellist, a prior incident, or anything that constrains the choice. This becomes the canonical defence for the methodological decision when a thesis chapter cites it.</div>
      <textarea class="rationale-area" id="rationale" placeholder="The reason I pick this is …">${escapeHtml(a.rationale)}</textarea>
    </div>`;

  // Confidence
  html += `
    <div class="form-group">
      <span class="form-label">Confidence in this choice</span>
      <div class="pill-group" id="confidencePills">
        ${[
          ["tentative", "Tentative — revisit"],
          ["likely", "Likely — but open"],
          ["confident", "Confident"],
          ["settled", "Settled — defended"]
        ].map(([val, label]) => `<div class="pill ${a.confidence === val ? "selected" : ""}" data-confidence="${val}">${label}</div>`).join("")}
      </div>
    </div>`;

  // Flag
  html += `
    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="flagForPanel" ${a.flagForPanel ? "checked" : ""}>
        <label for="flagForPanel">Flag for panel review (raise this at the next methodology panel)</label>
      </div>
    </div>`;

  // Nav
  const isFirst = currentNodeIdx === 0;
  const isLast = currentNodeIdx === NODES.length - 1;
  html += `
    <div class="node-nav">
      <button class="nav-btn" id="btnPrev" ${isFirst ? "disabled" : ""}>← Previous</button>
      <div class="nav-status">${isAnswered(n.id) ? "✓ answered" : "unanswered"} · jumps autosave</div>
      <button class="nav-btn primary" id="btnNext">${isLast ? "Finish →" : "Next →"}</button>
    </div>`;

  html += `</div>`;
  document.getElementById("rightPane").innerHTML = html;

  bindRightPaneHandlers();
}

function renderCompletion() {
  const total = NODES.length;
  const done = answeredCount();
  const html = `
    <div class="node-card">
      <div class="completion-banner">
        <h2>Walkthrough complete</h2>
        <p>You have answered ${done} of ${total} nodes. Export the JSON below and hand it to Codex (or commit it under <code>data/paper_quality_dk_preferences.json</code>) so the build's per-field extractor prompts can be regenerated from your decisions.</p>
        <p>Anything you want to revisit, jump back via "All nodes" in the header.</p>
        <button class="btn primary" id="btnExport2">Export JSON</button>
      </div>
    </div>`;
  document.getElementById("rightPane").innerHTML = html;
  document.getElementById("btnExport2").addEventListener("click", exportJSON);
}

// ==========================================================================
// Event handlers
// ==========================================================================

function bindRightPaneHandlers() {
  document.querySelectorAll(".option-row").forEach(row => {
    row.addEventListener("click", (e) => {
      // Don't capture clicks on the write-in input itself
      if (e.target.tagName === "INPUT" && e.target.type === "text") return;
      const idx = row.dataset.optionIdx;
      const n = NODES[currentNodeIdx];
      const a = getAnswer(n.id);
      if (idx === "other") {
        a.selectedOption = null;
        a.selectedOptionIsOther = true;
      } else {
        a.selectedOption = n.options[parseInt(idx, 10)].label;
        a.selectedOptionIsOther = false;
        a.writeInLabel = "";
      }
      a.updatedAt = new Date().toISOString();
      saveState();
      renderRightPane();
      renderProgress();
      renderLeftPaneStatus();
    });
  });

  const writeInInput = document.getElementById("writeInLabel");
  if (writeInInput) {
    writeInInput.addEventListener("input", (e) => {
      const a = getAnswer(NODES[currentNodeIdx].id);
      a.writeInLabel = e.target.value;
      a.updatedAt = new Date().toISOString();
      saveState();
      renderProgress();
    });
    writeInInput.addEventListener("click", (e) => e.stopPropagation());
  }

  document.getElementById("rationale").addEventListener("input", (e) => {
    const a = getAnswer(NODES[currentNodeIdx].id);
    a.rationale = e.target.value;
    a.updatedAt = new Date().toISOString();
    saveState();
    renderProgress();
  });

  document.querySelectorAll("#confidencePills .pill").forEach(pill => {
    pill.addEventListener("click", () => {
      const a = getAnswer(NODES[currentNodeIdx].id);
      a.confidence = a.confidence === pill.dataset.confidence ? null : pill.dataset.confidence;
      a.updatedAt = new Date().toISOString();
      saveState();
      renderRightPane();
    });
  });

  document.getElementById("flagForPanel").addEventListener("change", (e) => {
    const a = getAnswer(NODES[currentNodeIdx].id);
    a.flagForPanel = e.target.checked;
    a.updatedAt = new Date().toISOString();
    saveState();
  });

  document.getElementById("btnPrev").addEventListener("click", () => goTo(currentNodeIdx - 1));
  document.getElementById("btnNext").addEventListener("click", () => goTo(currentNodeIdx + 1));
}

function renderLeftPaneStatus() {
  // Light-weight repaint: just update the DK preference placeholders without rebuilding the whole tree
  const placeholders = document.querySelectorAll(".left-pane h3");
  placeholders.forEach((h3) => {
    const m = h3.textContent.match(/^Node ([0-9.]+) —/);
    if (!m) return;
    const nodeId = m[1];
    const node = NODES.find(n => n.id === nodeId);
    if (!node) return;
    const next = h3.nextElementSibling;
    // Find this node's placeholder by walking forward to the next .dk-pref-placeholder
    let cursor = h3.nextElementSibling;
    while (cursor && !cursor.classList.contains("dk-pref-placeholder")) {
      cursor = cursor.nextElementSibling;
    }
    if (!cursor) return;
    if (isAnswered(nodeId)) {
      const a = state.answers[nodeId];
      const choice = a.selectedOptionIsOther
        ? `<em>Other — ${escapeHtml(a.writeInLabel)}</em>`
        : `<strong>${escapeHtml(a.selectedOption)}</strong>`;
      cursor.className = "dk-pref-placeholder filled";
      cursor.innerHTML = `<strong>DK preference:</strong> ${choice}<br><span style="font-size:12.5px;">${escapeHtml(a.rationale)}</span>`;
    } else {
      cursor.className = "dk-pref-placeholder";
      cursor.innerHTML = `<strong>DK preference:</strong> [unanswered]`;
    }
  });
}

function goTo(idx) {
  if (idx < 0) return;
  if (idx > NODES.length) return;
  currentNodeIdx = idx;
  saveState(true);
  renderProgress();
  renderRightPane();
  renderLeftPane();
}

// ==========================================================================
// Export
// ==========================================================================

function exportJSON() {
  const payload = {
    schema_version: "1.0",
    generated_at: new Date().toISOString(),
    source_document: TREE.source,
    total_nodes: NODES.length,
    answered_nodes: answeredCount(),
    answers: {}
  };
  for (const n of NODES) {
    const a = state.answers[n.id];
    if (!a) continue;
    payload.answers[n.id] = {
      branch_id: n.branchId,
      branch_title: n.branchTitle,
      node_title: n.title,
      selected_option: a.selectedOption,
      selected_option_is_other: a.selectedOptionIsOther,
      write_in_label: a.writeInLabel,
      rationale: a.rationale,
      confidence: a.confidence,
      flag_for_panel: a.flagForPanel,
      updated_at: a.updatedAt
    };
  }
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `paper_quality_dk_preferences_${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

// ==========================================================================
// Helpers
// ==========================================================================

function escapeHtml(str) {
  return String(str || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(str) {
  return escapeHtml(str);
}

function bindHeaderHandlers() {
  document.getElementById("btnExport").addEventListener("click", exportJSON);
  document.getElementById("btnAllNodes").addEventListener("click", () => {
    const choices = NODES.map((n, i) => `${i + 1}. ${n.id} — ${n.title}${isAnswered(n.id) ? " ✓" : ""}`).join("\n");
    const pick = prompt(`Jump to which node? (enter number 1–${NODES.length})\n\n${choices}`);
    if (!pick) return;
    const idx = parseInt(pick, 10) - 1;
    if (Number.isFinite(idx) && idx >= 0 && idx < NODES.length) goTo(idx);
  });
}

// ==========================================================================
// Init
// ==========================================================================

bindHeaderHandlers();
renderProgress();
renderLeftPane();
renderRightPane();
</script>

</body>
</html>
