<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article — Knowledge Atlas</title>
<script src="ka_canonical_navbar.js" defer></script>
<script src="ka_user_type.js" defer></script>
<script src="ka_data_adapter.js"></script>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#F7F4EF;color:#26322F;line-height:1.62}
  a{color:#2A7868}
  .page-shell{max-width:1010px;margin:0 auto;padding:18px 22px 42px}
  .art-breadcrumb{font-size:.8rem;color:#6B6B6B;margin-bottom:10px}
  .art-breadcrumb a{text-decoration:none}
  .art-breadcrumb a:hover{text-decoration:underline}
  .article-identifier{background:#1F4E45;color:#EFF8F4;border-radius:10px;padding:10px 13px;margin-bottom:14px}
  .identifier-label{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;font-weight:800;color:#BFD8D0;margin-bottom:6px}
  .identifier-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .pill{display:inline-flex;align-items:center;padding:3px 8px;border:1px solid rgba(255,255,255,.18);border-radius:999px;background:rgba(255,255,255,.08);color:#F2FAF7;font-size:.71rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;text-decoration:none}
  .pill.topic{background:rgba(245,166,35,.16);color:#FFE2B7}
  .article-title{font-family:Georgia,serif;font-size:1.72rem;line-height:1.18;color:#173D36;margin:0 0 7px;max-width:940px}
  .article-byline{font-size:.93rem;color:#53645F;margin-bottom:18px}
  .article-byline .muted{color:#7A8581}
  .async-status{background:#EEF7F4;border:1px solid #BFD8D0;border-left:4px solid #2A7868;border-radius:8px;padding:10px 12px;margin:0 0 14px;color:#244A43;font-size:.88rem}
  .async-status b{color:#173D36}
  .main-col{max-width:940px;margin:0 auto}
  .section{background:#fff;border:1px solid #E4DCCF;border-radius:10px;padding:18px 20px;margin-bottom:14px;scroll-margin-top:76px}
  .section.reading{padding-top:20px}
  .section h2{font-family:Georgia,serif;font-size:1.22rem;color:#173D36;margin-bottom:9px}
  .section h3{font-size:.98rem;color:#173D36;margin-bottom:6px}
  .section p{margin-bottom:9px}
  .section p:last-child{margin-bottom:0}
  .section-note{font-size:.88rem;color:#6B6B6B}
  .abstract{background:#F7FBF9;border-left:3px solid #2A7868;padding:12px 14px;border-radius:0 8px 8px 0}
  .subhead{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:#8A9A96;font-weight:700;margin-bottom:8px}
  .summary-grid{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:18px;align-items:start}
  .summary-carousel{background:#F8F6F1;border:1px solid #E0D8CC;border-radius:10px;padding:10px}
  .summary-carousel img{display:block;width:100%;height:230px;object-fit:contain;background:#EFE8DB;border-radius:7px;margin-bottom:8px}
  .summary-carousel .caption{font-size:.8rem;color:#5E5B54}
  .summary-carousel .caption b{color:#173D36}
  .summary-carousel .strip{display:flex;gap:6px;overflow:auto;margin-top:8px}
  .summary-carousel .strip img{width:64px;height:48px;object-fit:cover;margin:0;border:2px solid transparent;cursor:pointer}
  .summary-carousel .strip img.active{border-color:#2A7868}
  .summary-blocks{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
  .soft-box{background:#F8F6F1;border:1px solid #E0D8CC;border-radius:9px;padding:12px 13px}
  .soft-box p{font-size:.9rem}
  details.more{margin-top:12px;border-top:1px solid #E0D8CC;padding-top:10px}
  details.more summary{cursor:pointer;color:#2A7868;font-weight:700}
  details.more .more-body{margin-top:10px}
  .journey-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
  .journey-card{display:block;background:#F8F6F1;border:1px solid #E0D8CC;border-radius:9px;padding:13px 14px;text-decoration:none;color:#26322F}
  .journey-card:hover{border-color:#2A7868;box-shadow:0 8px 22px rgba(28,61,58,.08);transform:translateY(-1px)}
  .journey-card .eyebrow{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:#8A9A96;font-weight:700;margin-bottom:7px}
  .journey-card h3{font-size:1rem;color:#173D36;margin-bottom:6px}
  .journey-card p{font-size:.9rem;color:#40514D;margin:0 0 9px}
  .journey-card .meta{font-size:.8rem;color:#6B6B6B}
  .measure-table{width:100%;border-collapse:collapse;font-size:.88rem}
  .measure-table th,.measure-table td{border-bottom:1px solid #E7DED0;padding:8px 7px;text-align:left;vertical-align:top}
  .measure-table th{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#6A7D77;background:#F8F6F1}
  .measure-table td:first-child{font-weight:700;color:#173D36}
  .pnu-body{background:#F7FBF9;border-left:3px solid #2A7868;padding:12px 14px;border-radius:0 8px 8px 0}
  .empty-state{background:#fff;border:1.5px solid #F5D09F;border-radius:16px;padding:24px 28px}
  .empty-state h2{font-family:Georgia,serif;color:#9A5010;margin-bottom:8px}
  .empty-state p{color:#6B6B6B}
  .loading{text-align:center;color:#8A9A96;padding:70px 20px}

  .page-footer{background:#1C3D3A;color:#D6E6E0;padding:14px 22px;font-size:.82rem}
  .page-footer-inner{max-width:1010px;margin:0 auto;display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap}
  .page-footer a{color:#F5A623;text-decoration:none;font-weight:600}
  .page-footer a:hover{text-decoration:underline}

  @media (max-width:980px){
    .summary-grid{grid-template-columns:1fr}
    .summary-carousel img{height:260px}
  }
  @media (max-width:720px){
    .page-shell{padding:14px 14px 30px}
    .article-title{font-size:1.44rem}
    .summary-blocks{grid-template-columns:1fr}
  }
</style>
</head>
<body data-ka-regime="global" data-ka-active="articles">
<div id="ka-navbar-slot"></div>

<main class="page-shell">
  <div class="art-breadcrumb">
    <a href="ka_home.html">Home</a> ›
    <a href="ka_articles.html">Articles</a> ›
    <span id="crumb-title">Article</span>
  </div>
  <div id="art-mount" class="loading">Loading article record…</div>
</main>

<footer class="page-footer">
  <div class="page-footer-inner">
    <div>Article pages now read from the Atlas payloads plus the exported V7 detail surface, so the science summary, operationalization, and PNU sections come from the current extraction lineage rather than from a thin article stub.</div>
    <div><a href="ka_home.html">Home</a> · <a href="ka_topics.html">Topics</a> · <a href="ka_articles.html">Articles</a></div>
  </div>
</footer>

<script>
const esc = value => String(value == null ? '' : value).replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;'}[c])
);

const compact = (text, limit = 260) => {
  const value = String(text || '').replace(/\s+/g, ' ').trim();
  if (!value) return '';
  return value.length <= limit ? value : value.slice(0, limit - 1).trimEnd() + '…';
};

function paragraphize(text) {
  return String(text || '')
    .split(/\n{2,}/)
    .map(chunk => chunk.trim())
    .filter(Boolean)
    .map(chunk => `<p>${esc(chunk)}</p>`)
    .join('');
}

function metricCard(label, value, sub) {
  return `<div class="stat-card"><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div>${sub ? `<div class="sub">${esc(sub)}</div>` : ''}</div>`;
}

function lowerKey(value) {
  return String(value || '').replace(/\s+/g, ' ').trim().toLowerCase();
}

function journeyHref(path, params = {}) {
  const query = new URLSearchParams();
  Object.entries(params || {}).forEach(([key, value]) => {
    const text = String(value || '').trim();
    if (text) query.set(key, text);
  });
  const suffix = query.toString();
  return suffix ? `${path}?${suffix}` : path;
}

function topicHref(label, extraParams = {}) {
  const raw = String(label || '').trim();
  return raw ? journeyHref('ka_topic_facet_view.html', { topic: raw, ...extraParams }) : 'ka_topic_facet_view.html';
}

function theoryHref(label, theoryByName, extraParams = {}) {
  const raw = String(label || '').trim();
  if (!raw) return '';
  const hit = theoryByName.get(lowerKey(raw));
  if (hit && hit.id) return journeyHref('ka_home_theory.html', { theory: hit.id, ...extraParams });
  return '';
}

function mechanismHref(theoryRow, extraParams = {}) {
  const focus = theoryRow && (theoryRow.id || theoryRow.name) ? (theoryRow.id || theoryRow.name) : '';
  return journeyHref('ka_journey_mechanism.html', { theory: focus, ...extraParams });
}

function renderChipCollection(items, emptyText) {
  if (!items || !items.length) {
    return `<p class="section-note">${esc(emptyText)}</p>`;
  }
  return `<div class="chip-row">${items.map(item => `<span class="chip">${esc(item)}</span>`).join('')}</div>`;
}

function renderLinkedChipCollection(items, emptyText, hrefFor, extraClass = '') {
  if (!items || !items.length) {
    return `<p class="section-note">${esc(emptyText)}</p>`;
  }
  return `<div class="chip-row">${items.map(item => {
    const href = hrefFor(item);
    if (!href) return `<span class="chip">${esc(item)}</span>`;
    const cls = ['chip-link', extraClass].filter(Boolean).join(' ');
    return `<a class="${cls}" data-runtime-link="${esc(href)}">${esc(item)}</a>`;
  }).join('')}</div>`;
}

function hydrateRuntimeLinks(root) {
  (root || document).querySelectorAll('[data-runtime-link]').forEach(node => {
    node.setAttribute('href', node.getAttribute('data-runtime-link'));
  });
}

function renderPaperRefs(rows, emptyText) {
  if (!rows || !rows.length) {
    return `<p class="section-note">${esc(emptyText)}</p>`;
  }
  return `<div class="list">${rows.map(row => `
    <div class="list-row">
      <h3><a href="ka_article_view.html?id=${encodeURIComponent(row.paper_id)}">${esc(row.title || row.paper_id)}</a></h3>
      <div class="meta">${esc(row.primary_topic || 'Topic pending')} ${row.year ? '· ' + esc(row.year) : ''}</div>
      <div class="counts">${esc(String(row.link_count || 0))} explicit link${(row.link_count || 0) === 1 ? '' : 's'} in the current argumentation layer</div>
    </div>
  `).join('')}</div>`;
}

function renderClaimRows(rows) {
  if (!rows || !rows.length) {
    return '<p class="section-note">No claim-level evidence rows were available for this article.</p>';
  }
  return `<div class="list">${rows.map(row => `
    <div class="list-row">
      <div class="meta">${esc(row.signal || 'Claim')} · ${esc(row.warrant || 'Warrant pending')} · credence ${row.credence == null ? '—' : esc(Number(row.credence).toFixed(2))}</div>
      <div class="body">${esc(row.finding || '')}</div>
      <div class="counts">${esc(String(row.support_count || 0))} supports · ${esc(String(row.attack_count || 0))} attacks · ${esc(row.qualifier || 'status pending')}</div>
    </div>
  `).join('')}</div>`;
}

function renderMeasureRows(items, key) {
  if (!items || !items.length) return '<p class="section-note">No entries surfaced yet.</p>';
  return `<div class="list">${items.slice(0, 10).map(item => `
    <div class="list-row">
      <h3>${esc(item[key] || item.name || 'Unnamed')}</h3>
      <div class="meta">${esc(item.instrument_type || item.type || item.target_construct || 'Unclassified')}</div>
      <div class="counts">${Array.isArray(item.page_refs) && item.page_refs.length ? 'pages ' + esc(item.page_refs.join(', ')) : 'page refs pending'}</div>
    </div>
  `).join('')}</div>`;
}

function formatTypeLabel(value) {
  return String(value || '').replace(/_/g, ' ').trim() || 'Unclassified';
}

function pageRefs(value) {
  return Array.isArray(value) && value.length ? value.join(', ') : 'pending';
}

function renderOperationalTable(operationalization) {
  const rows = [];
  (operationalization.ivs || []).filter(Boolean).forEach(item => rows.push({
    kind: 'Intervention',
    name: item.operationalisation || 'Independent variable',
    target: Array.isArray(item.levels) && item.levels.length ? item.levels.join(' vs ') : '',
    type: item.extraction_status || '',
    pages: item.page_refs,
  }));
  (operationalization.dvs || []).forEach(item => rows.push({
    kind: 'Outcome',
    name: item.name,
    target: item.claimed_construct || '',
    type: item.type || item.measurement_window,
    pages: item.page_refs,
  }));
  (operationalization.measures || []).forEach(item => rows.push({
    kind: item.admit_verdict === 'admit_as_is' ? 'VR-ready measure' : 'Substitution',
    name: item.dv_input || item.measure_short_code,
    target: item.resolved_construct_id || item.claimed_construct || '',
    type: item.measure_short_code || item.admit_verdict,
    pages: item.page_refs,
  }));
  (operationalization.measurement_inventory || []).forEach(item => rows.push({
    kind: 'Measure',
    name: item.measure_name || item.instrument_name || item.outcome,
    target: item.target_construct || item.outcome || item.linked_dependent_variable,
    type: item.instrument_type,
    pages: item.page_refs,
  }));
  (operationalization.instrument_inventory || []).forEach(item => rows.push({
    kind: 'Instrument',
    name: item.name,
    target: item.target_construct || '',
    type: item.type || item.instrument_type,
    pages: item.page_refs,
  }));
  (operationalization.sensor_inventory || []).forEach(item => rows.push({
    kind: 'Sensor',
    name: item.name,
    target: item.target_construct || '',
    type: item.type,
    pages: item.page_refs,
  }));
  if (!rows.length) return '<p class="section-note">No instruments or sensors were exported for this paper yet.</p>';
  return `<table class="measure-table">
    <thead><tr><th>Kind</th><th>Name</th><th>Measures</th><th>Type</th><th>Pages</th></tr></thead>
    <tbody>${rows.slice(0, 24).map(row => `
      <tr>
        <td>${esc(row.kind)}</td>
        <td>${esc(row.name || 'Unnamed')}</td>
        <td>${esc(row.target || 'not tied to one outcome')}</td>
        <td>${esc(formatTypeLabel(row.type))}</td>
        <td>${esc(pageRefs(row.pages))}</td>
      </tr>
    `).join('')}</tbody>
  </table>`;
}

function localArticleImageUrl(path) {
  const text = String(path || '');
  const match = text.match(/\/pdf_cache\/(PDF-\d+)\/pageimages_200\/(page_\d+\.png)$/);
  if (!match) return text;
  return `data/ka_payloads/article_images/${encodeURIComponent(match[1])}/${encodeURIComponent(match[2])}`;
}

function collectSummaryImages(detail, operationalization) {
  const images = [];
  const seen = new Set();
  function add(path, caption, page) {
    const src = localArticleImageUrl(path);
    if (!src || seen.has(src)) return;
    seen.add(src);
    images.push({ src, caption: caption || 'Paper image used by the Atlas extraction.', page });
  }
  (detail.visual_support_gallery || []).forEach(item => add(item.image_url, item.atlas_caption || item.atlas_title, item.page));
  const technical = detail.technical_results_table || {};
  if (technical.image_url) add(technical.image_url, technical.caption || technical.title, technical.page);
  (operationalization.measurement_inventory || []).forEach(item => {
    (item.page_image_paths || []).forEach(path => add(path, `${item.measure_name || item.instrument_name || 'Measurement'} evidence surface`, (item.page_refs || [])[0]));
  });
  return images.slice(0, 6);
}

function renderSummaryCarousel(images) {
  if (!images.length) return '';
  const first = images[0];
  return `<aside class="summary-carousel" data-carousel>
    <img class="carousel-main" src="${esc(first.src)}" alt="${esc(first.caption)}" loading="lazy">
    <div class="caption"><b>${first.page ? 'Page ' + esc(first.page) + ': ' : ''}</b><span class="carousel-caption">${esc(first.caption)}</span></div>
    ${images.length > 1 ? `<div class="strip">${images.map((img, index) => `
      <img class="${index === 0 ? 'active' : ''}" src="${esc(img.src)}" alt="${esc(img.caption)}" data-caption="${esc(img.caption)}" data-page="${esc(img.page || '')}">
    `).join('')}</div>` : ''}
  </aside>`;
}

function hydrateCarousels(root) {
  (root || document).querySelectorAll('[data-carousel]').forEach(carousel => {
    const main = carousel.querySelector('.carousel-main');
    const caption = carousel.querySelector('.carousel-caption');
    const captionWrap = carousel.querySelector('.caption b');
    carousel.querySelectorAll('.strip img').forEach(thumb => {
      thumb.addEventListener('click', () => {
        carousel.querySelectorAll('.strip img').forEach(node => node.classList.remove('active'));
        thumb.classList.add('active');
        main.src = thumb.src;
        main.alt = thumb.alt || '';
        caption.textContent = thumb.dataset.caption || '';
        captionWrap.textContent = thumb.dataset.page ? `Page ${thumb.dataset.page}: ` : '';
      });
    });
  });
}

function renderMetaBox(label, value) {
  return `
    <div class="meta-box">
      <div class="label">${esc(label)}</div>
      <div class="value">${esc(value || 'Pending')}</div>
    </div>
  `;
}

function renderPnuPanelBasis(items) {
  if (!items || !items.length) {
    return '<p class="section-note">No panel basis rows were exported for this paper.</p>';
  }
  return `<div class="list">${items.slice(0, 6).map(item => `
    <div class="list-row">
      <h3>${esc(item.panel_id || item.role || 'Panel basis')}</h3>
      <div class="meta">${esc(item.role || 'role pending')} · ${esc(item.status || 'status pending')}</div>
      <div class="counts">${item.used_to_generate ? 'used to generate' : 'reference basis only'}${item.doc_path ? ' · ' + esc(item.doc_path) : ''}</div>
    </div>
  `).join('')}</div>`;
}

function renderVisualGallery(items) {
  if (!items || !items.length) {
    return '<p class="section-note">No visual support surfaces were exported for this paper yet.</p>';
  }
  return `<div class="gallery-grid">${items.slice(0, 8).map(item => `
    <div class="gallery-card">
      ${item.image_url ? '<img src="' + esc(item.image_url) + '" alt="' + esc(item.atlas_title || 'Visual support surface') + '" loading="lazy">' : ''}
      <div class="gallery-copy">
        <h3>${esc(item.atlas_title || 'Visual support surface')}</h3>
        <p>${esc(compact(item.atlas_caption || '', 220) || 'Recovered visual support surface.')}</p>
        <div class="meta">${esc(item.surface_kind || 'surface')} · page ${esc(item.page || '—')}</div>
      </div>
    </div>
  `).join('')}</div>`;
}

function renderTechnicalSurface(item) {
  if (!item || typeof item !== 'object' || Array.isArray(item)) {
    return '<p class="section-note">No technical result surface was exported for this paper yet.</p>';
  }
  return `
    <div class="result-surface">
      ${item.image_url ? '<img src="' + esc(item.image_url) + '" alt="' + esc(item.title || 'Technical results surface') + '" loading="lazy">' : ''}
      <div>
        <h3>${esc(item.title || 'Technical results surface')}</h3>
        ${item.summary ? `<p>${esc(item.summary)}</p>` : ''}
        ${item.caption ? `<p class="section-note">${esc(item.caption)}</p>` : ''}
        <div class="meta">Page ${esc(item.page || '—')}</div>
      </div>
    </div>
  `;
}

function updateTocActive() {
  const links = Array.from(document.querySelectorAll('.toc a[href^="#"]'));
  const sections = links.map(link => document.getElementById(link.getAttribute('href').slice(1))).filter(Boolean);
  const y = window.scrollY + 120;
  let active = sections[0] && sections[0].id;
  sections.forEach(section => {
    if (section.offsetTop <= y) active = section.id;
  });
  links.forEach(link => link.classList.toggle('active', link.getAttribute('href') === '#' + active));
}

(async function(){
  const mount = document.getElementById('art-mount');
  const crumb = document.getElementById('crumb-title');
  const params = new URLSearchParams(window.location.search);
  const paperId = params.get('id') || params.get('paper_id') || params.get('paper') || '';
  const beliefId = params.get('belief_id') || '';

  if (!paperId) {
    mount.className = 'empty-state';
    mount.innerHTML = `
      <h2>No article id was provided</h2>
      <p>This page expects a paper id such as <code>PDF-0007</code>. Open it from the article or topic listings so the Atlas can load the correct record.</p>
    `;
    crumb.textContent = 'No article loaded';
    return;
  }

  let articlesPayload = {};
  let detailsPayload = {};
  let theoriesPayload = { theories: [] };
  try {
    if (window.KA_DATA_ADAPTER) {
      [articlesPayload, detailsPayload, theoriesPayload] = await Promise.all([
        window.KA_DATA_ADAPTER.loadPayload('articles', { articles: [] }),
        window.KA_DATA_ADAPTER.loadPayload('article_details', { details: {} }),
        window.KA_DATA_ADAPTER.loadPayload('theories', { theories: [] }),
      ]);
    } else {
      const [articlesRes, detailsRes, theoryRes] = await Promise.all([
        fetch('data/ka_payloads/articles.json', { cache: 'no-store' }),
        fetch('data/ka_payloads/article_details.json', { cache: 'no-store' }),
        fetch('data/ka_payloads/theories.json', { cache: 'no-store' }),
      ]);
      if (!articlesRes.ok) throw new Error('articles payload HTTP ' + articlesRes.status);
      if (!detailsRes.ok) throw new Error('article detail payload HTTP ' + detailsRes.status);
      if (!theoryRes.ok) throw new Error('theories payload HTTP ' + theoryRes.status);
      articlesPayload = await articlesRes.json();
      detailsPayload = await detailsRes.json();
      theoriesPayload = await theoryRes.json();
    }
  } catch (error) {
    mount.className = 'empty-state';
    mount.innerHTML = `
      <h2>Could not load the article payloads</h2>
      <p>This page needs <code>articles.json</code> and <code>article_details.json</code> to render the richer Atlas view. Error: <code>${esc(error.message || error)}</code></p>
    `;
    crumb.textContent = paperId;
    return;
  }

  let article = ((articlesPayload && articlesPayload.articles) || []).find(row => row && row.paper_id === paperId);
  let detail = ((detailsPayload && detailsPayload.details) || {})[paperId] || {};
  if (!article) {
    try {
      const query = beliefId ? `?belief_id=${encodeURIComponent(beliefId)}` : '';
      const asyncRes = await fetch(`/api/v7_lite/article/${encodeURIComponent(paperId)}${query}`, { cache: 'no-store' });
      if (asyncRes.ok) {
        const asyncPayload = await asyncRes.json();
        article = asyncPayload.article || null;
        detail = asyncPayload.detail || {};
      }
    } catch (error) {
      // Static-file-only dev servers cannot serve the fresh async Article Eater path.
    }
    if (!article) {
      mount.className = 'empty-state';
      mount.innerHTML = `
        <h2>Article ${esc(paperId)} is not in the current payload</h2>
        <p>The canonical article payload does not currently include this paper id. Fresh V7-Lite async uploads require the dynamic KA server, not the static file server.</p>
      `;
      crumb.textContent = paperId;
      return;
    }
  }

  const science = detail.science_summary || {};
  const pnu = detail.pnu || {};
  const operationalization = detail.operationalization || {};
  const evidenceProfile = detail.evidence_profile || {};
  const atlasReading = detail.atlas_reading || {};
  const articleMeta = detail.article_meta || {};
  const detailArgumentation = detail.argumentation || {};
  const detailTheories = (detail.theories && detail.theories.length ? detail.theories : article.theories) || [];
  const detailRelatedPapers = (detail.related_papers && detail.related_papers.length ? detail.related_papers : article.related_papers) || [];
  const constructLabels = detail.constructs || [];
  const instrumentTags = detail.instruments || [];
  const visualGallery = detail.visual_support_gallery || [];
  const technicalSurface = (detail.technical_results_table && typeof detail.technical_results_table === 'object' && !Array.isArray(detail.technical_results_table))
    ? detail.technical_results_table
    : null;
  const topClaims = detail.top_claims || [];
  const supportingPapers = detail.supporting_papers || [];
  const contradictingPapers = detail.contradicting_papers || [];
  const authors = Array.isArray(articleMeta.authors) && articleMeta.authors.length
    ? articleMeta.authors.join(', ')
    : (Array.isArray(article.authors) ? article.authors.join(', ') : '');
  const articleTypeLabel = String(article.article_type || '').replace(/_/g, ' ').trim();
  const topicLabels = article.topic_labels || [];
  const articleArgumentation = article.argumentation_summary || {};
  const theoryRows = (theoriesPayload && theoriesPayload.theories) || [];
  const theoryByName = new Map(theoryRows.map(row => [lowerKey(row.name || row.id), row]));
  const firstTheoryLabel = detailTheories.find(Boolean) || '';
  const firstTheoryRow = theoryByName.get(lowerKey(firstTheoryLabel)) || null;
  const articleJourneyParams = paperId ? { from_article: paperId } : {};
  const firstTheoryLink = firstTheoryLabel ? theoryHref(firstTheoryLabel, theoryByName, articleJourneyParams) : '';
  const primaryTopicLink = article.primary_topic ? topicHref(article.primary_topic, articleJourneyParams) : '';
  const firstTopicLink = topicLabels.length ? topicHref(topicLabels[0], articleJourneyParams) : primaryTopicLink;
  const mechanismLink = mechanismHref(firstTheoryRow, articleJourneyParams);
  const summaryImages = collectSummaryImages(detail, operationalization);
  const completionStatus = articleMeta.completion_status || '';
  const sourcePdfPath = articleMeta.source_pdf_path || '';
  const asyncStatus = completionStatus ? `
    <div class="async-status">
      <b>Fresh Atlas article.</b>
      ${sourcePdfPath ? ` · Source PDF preserved` : ''}
    </div>` : '';

  document.title = `${article.title || paperId} — Knowledge Atlas`;
  crumb.textContent = paperId;

  mount.className = '';
  mount.innerHTML = `
    <div class="article-identifier">
      <div class="identifier-label">Article identifier</div>
      <div class="identifier-row">
        <span class="pill">${esc(paperId)}</span>
        ${articleTypeLabel ? `<span class="pill">${esc(articleTypeLabel)}</span>` : ''}
        ${article.year ? `<span class="pill">${esc(article.year)}</span>` : ''}
        ${article.primary_topic ? `<a class="pill topic article-primary-topic-link" data-runtime-link="${esc(primaryTopicLink)}">${esc(article.primary_topic)}</a>` : ''}
      </div>
    </div>
    <h1 class="article-title">${esc(article.title || paperId)}</h1>
    <div class="article-byline">
      ${authors ? esc(authors) : '<span class="muted">Authors pending</span>'}
      ${article.venue ? ` <span class="muted">· ${esc(article.venue)}</span>` : ''}
    </div>
    ${asyncStatus}

    <div class="main-col">
        <section class="section reading" id="atlas-reading">
          <div class="subhead">Science summary</div>
          <h2>What this paper says</h2>
          <div class="summary-grid">
            <div>
              ${science.core_finding ? paragraphize(science.core_finding) : '<p class="section-note">The science summary has not yet been exported for this paper.</p>'}
              ${science.key_statistics ? `<div class="soft-box" style="margin-top:12px"><h3>Key details</h3>${paragraphize(science.key_statistics)}</div>` : ''}
            </div>
            ${renderSummaryCarousel(summaryImages)}
          </div>
          <div class="summary-blocks">
            <div class="soft-box">
              <h3>Methods and design</h3>
              ${science.methods_and_design ? paragraphize(compact(science.methods_and_design, 900)) : '<p class="section-note">Methods summary pending.</p>'}
            </div>
            <div class="soft-box">
              <h3>Why it matters</h3>
              ${science.design_implications ? paragraphize(compact(science.design_implications, 900)) : (atlasReading.core_finding_text ? paragraphize(compact(atlasReading.core_finding_text, 900)) : '<p class="section-note">Atlas interpretation pending.</p>')}
            </div>
          </div>
          ${science.limitations || science.gap_and_door || article.abstract ? `
            <details class="more">
              <summary>Longer summary, limits, and abstract</summary>
              <div class="more-body">
                ${science.limitations ? `<div class="soft-box" style="margin-bottom:10px"><h3>Limitations and uncertainty</h3>${paragraphize(science.limitations)}</div>` : ''}
                ${science.gap_and_door ? `<div class="soft-box" style="margin-bottom:10px"><h3>The gap and the door</h3>${paragraphize(science.gap_and_door)}</div>` : ''}
                ${article.abstract ? `<div class="abstract"><h3>Paper abstract</h3>${paragraphize(article.abstract)}</div>` : ''}
              </div>
            </details>` : ''}
        </section>

        <section class="section" id="measures">
          <h2>Instruments and sensors</h2>
          ${renderOperationalTable(operationalization)}
        </section>

        <section class="section" id="journey">
          <div class="subhead">Cross-page navigation</div>
          <h2>Continue the Atlas journey</h2>
          <p class="section-note" style="margin-bottom:14px">A single paper is usually too small a unit to understand the real structure of the evidence. These links move from this paper into its topic bundle, its theory neighbourhood, and the mechanism layer.</p>
          <div class="journey-grid">
            <a class="journey-card journey-link-topic" data-runtime-link="${esc(firstTopicLink || 'ka_topic_facet_view.html')}">
              <div class="eyebrow">Topic surface</div>
              <h3>${esc(article.primary_topic || topicLabels[0] || 'Open the topic crosswalk')}</h3>
              <p>See the defended bundle, its architectural family, and the topic-level theory signals that this paper now sits inside.</p>
              <div class="meta">${esc(topicLabels.length || 0)} exported topic link${topicLabels.length === 1 ? '' : 's'} from this paper.</div>
            </a>
            <a class="journey-card journey-link-theory article-theory-link" data-runtime-link="${esc(firstTheoryLink || 'ka_home_theory.html')}">
              <div class="eyebrow">Theory surface</div>
              <h3>${esc(firstTheoryLabel || 'Open the live theory index')}</h3>
              <p>Move from this paper to the current theory record, its neighbouring theories, and the representative paper set carrying it.</p>
              <div class="meta">${esc(detailTheories.length || 0)} normalized theory link${detailTheories.length === 1 ? '' : 's'} on this paper.</div>
            </a>
            <a class="journey-card journey-link-mechanism" data-runtime-link="${esc(mechanismLink)}">
              <div class="eyebrow">Mechanism surface</div>
              <h3>Open the mechanism layer</h3>
              <p>Carry the paper's theory context into the mechanism inventory and the theories under the greatest argumentative pressure.</p>
              <div class="meta">${esc(firstTheoryLabel || 'Generic mechanism inventory')} ${firstTheoryLabel ? 'focus' : 'overview'}.</div>
            </a>
          </div>
        </section>

        <section class="section" id="pnu">
          <div class="subhead">Neuroscience reading</div>
          <h2>Plausible neural explanation</h2>
          <div class="pnu-body">${pnu.short_summary ? paragraphize(pnu.short_summary) : '<p class="section-note">No exported PNU short summary is available for this paper yet.</p>'}</div>
          ${pnu.long_summary ? `
            <details class="more">
              <summary>Open the longer PNU reading</summary>
              <div class="more-body">${paragraphize(pnu.long_summary)}</div>
            </details>` : ''}
        </section>
      </div>
  `;

  hydrateRuntimeLinks(mount);
  hydrateCarousels(mount);
})();
</script>
</body>
</html>
